<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ancient Wisdom</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    background: #d8c8a5;
    background-image:
        radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
    background-size: 4px 4px;
    color: #2c1d0f;
    font-family: 'EB Garamond', serif;
    line-height: 1.9;
}

.manuscript {
    max-width: 850px;
    margin: 50px auto;
    padding: 60px;
    background: #f4ecd8;
    border: 8px solid #8b6b3d;
    box-shadow: 0 0 30px rgba(0,0,0,0.25);
}

h1 {
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 3em;
    letter-spacing: 4px;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    font-style: italic;
    margin-bottom: 40px;
}

.divider {
    text-align: center;
    font-size: 1.5em;
    margin: 30px 0;
    color: #7b5a2f;
}

.chapter {
    margin-top: 40px;
}

.chapter-title {
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 1.4em;
    margin-bottom: 20px;
}

.verse {
    margin-bottom: 15px;
    text-align: justify;
}

.verse-number {
    color: #8b6b3d;
    font-weight: bold;
}

footer {
    margin-top: 50px;
    text-align: center;
    font-size: 0.9em;
    color: #6d5a3a;
}
</style>
</head>

<body>

<div class="manuscript">

    <h1>ਨਿਰੰਕਾਰ</h1>

    <div class="subtitle">
        ਸਾਧਸੰਗਤ ਨਾਲ ਜੁੜੋ ਅਤੇ ਨਾਮ ਜਪੋ
    </div>

    <div class="divider">✦ ✧ ✦</div>

    <div class="chapter">
        <div class="chapter-title"> ਨਿਯਮ</div>

        <div class="verse">
            <span class="verse-number">1.</span> ਸਾਧਸੰਗਤ ਵਿੱਚ ਆਓ
        </div>

        <div class="verse">
            <span class="verse-number">2.</span> ਨਾਮ ਜਪੋ
            
        </div>
  <div class="divider">❦</div>
        <div class="verse">
            <span class="verse-number">3.</span>
          ਰੱਬ ਅੱਗੇ ਅਰਦਾਸ ਕਰੋ
        </div>

        <div class="verse">
            <span class="verse-number">4.</span>
          ਰੱਬ ਦਾ ਸ਼ੁਕਰਾਨਾ ਕਰੋ
        </div>
    </div>

    <div class="divider">❦</div>

   

        <div class="verse">
            <span class="verse-number">5.</span>
          ਹਮੇਸ਼ਾ ਰੱਬ ਨੂੰ ਯਾਦ ਰੱਖੋ
        </div>

      
    <footer>
        ❦ ❦
    </footer>
<a href="https://harharlab.blogspot.com/2026/06/discussion.html">ਗੱਲ ਬਾਤ / Discussion
</a> 
</div>

</body>
</html>
